services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-my_ledge}
      POSTGRES_USER: ${POSTGRES_USER:-my_ledge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-my_ledge_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-my_ledge} -d ${POSTGRES_DB:-my_ledge}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  pgdata:
