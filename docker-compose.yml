services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-my_ledge}
      POSTGRES_USER: ${POSTGRES_USER:-my_ledge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-my_ledge_dev}
      DB_READONLY_PASSWORD: ${DB_READONLY_PASSWORD:-readonly_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-my_ledge} -d ${POSTGRES_DB:-my_ledge}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-my_ledge}:${DB_PASSWORD:-my_ledge_dev}@db:5432/${POSTGRES_DB:-my_ledge}
      API_KEY: ${API_KEY:-replace-me}
      EXCEL_PASSWORD: ${EXCEL_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    volumes:
      - uploads:/data/uploads

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  pgdata:
  uploads:
